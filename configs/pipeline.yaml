storage:
  duckdb:
    path: data/staged/products.duckdb
    raw_schema: raw_products
    staging_schema: staging_products

  huggingface:
    repo_id: saraNour/compliments-products
    private: false

scraping:
  rate_limit: 2
  max_retries: 3
  timeout: 30
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

logging:
  level: INFO
  file: logs/pipeline.log
