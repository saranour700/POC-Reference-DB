<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliments Product Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #333; padding: 20px; }
h1 { font-size: 20px; margin-bottom: 12px; }
.stats { font-size: 13px; color: #666; margin-bottom: 16px; }
.search { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; }
.search:focus { border-color: #4f6ef7; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 13px; }
th { background: #f1f3f5; text-align: left; padding: 10px 12px; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { background: #e9ecef; }
td { padding: 8px 12px; border-top: 1px solid #f0f0f0; }
tr:hover { background: #f8f9ff; }
.null { color: #ccc; }
.badge { display: inline-block; background: #e7f5ff; color: #1971c2; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.badge.sobeys { background: #fff3e0; color: #e65100; }
.pagination { margin-top: 16px; display: flex; gap: 8px; align-items: center; font-size: 13px; }
.pagination button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; }
.pagination button:hover { background: #f1f3f5; }
.pagination button:disabled { opacity: .4; cursor: default; }
.pagination span { color: #666; }
</style>
</head>
<body>
<h1>🍞 Compliments Product Explorer</h1>
<div class="stats" id="stats">Loading...</div>
<input class="search" id="search" placeholder="Search by product name, flavor, source..." oninput="render()">
<div style="overflow-x:auto"><table>
<thead><tr>
<th onclick="sort('canonical')">Canonical</th>
<th onclick="sort('product')">Product Type</th>
<th onclick="sort('flavor')">Flavor</th>
<th onclick="sort('qty')">Qty</th>
<th onclick="sort('unit')">Unit</th>
<th onclick="sort('source')">Source</th>
<th onclick="sort('cal')">Cal</th>
<th onclick="sort('fat')">Fat(g)</th>
<th onclick="sort('sodium')">Na(mg)</th>
<th onclick="sort('carbs')">Carbs(g)</th>
<th onclick="sort('protein')">Protein(g)</th>
</tr></thead>
<tbody id="body"></tbody>
</table></div>
<div class="pagination" id="pagination"></div>
<script>
let data = [], filtered = [], page = 0, sortKey = '', sortDir = 1;
const PAGE_SIZE = 50;
fetch('data.json').then(r=>r.json()).then(d => {
    data = d;
    document.getElementById('stats').textContent = `${d.length} variants · ${new Set(d.map(x=>x.canonical)).size} canonical products · ${new Set(d.map(x=>x.source)).size} sources`;
    render();
});
function render() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = data.filter(r => 
        (r.product||'').toLowerCase().includes(q) ||
        (r.flavor||'').toLowerCase().includes(q) ||
        (r.source||'').toLowerCase().includes(q) ||
        (r.canonical||'').toLowerCase().includes(q)
    );
    if (sortKey) filtered.sort((a,b) => {
        let va = a[sortKey], vb = b[sortKey];
        if (va == null) return 1; if (vb == null) return -1;
        return typeof va === 'number' ? (va - vb) * sortDir : String(va).localeCompare(String(vb)) * sortDir;
    });
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (page >= totalPages) page = 0;
    const start = page * PAGE_SIZE;
    const rows = filtered.slice(start, start + PAGE_SIZE);
    document.getElementById('body').innerHTML = rows.map(r => `<tr>
        <td><span class="badge${r.source==='sobeys'?' sobeys':''}">${r.canonical||''}</span></td>
        <td>${esc(r.product)}</td>
        <td>${esc(r.flavor)||'<span class="null">—</span>'}</td>
        <td>${r.qty != null ? r.qty : '<span class="null">—</span>'}</td>
        <td>${r.unit||'<span class="null">—</span>'}</td>
        <td><span class="badge${r.source==='sobeys'?' sobeys':''}">${r.source||''}</span></td>
        <td>${r.cal != null ? r.cal : '<span class="null">—</span>'}</td>
        <td>${r.fat != null ? r.fat : '<span class="null">—</span>'}</td>
        <td>${r.sodium != null ? r.sodium : '<span class="null">—</span>'}</td>
        <td>${r.carbs != null ? r.carbs : '<span class="null">—</span>'}</td>
        <td>${r.protein != null ? r.protein : '<span class="null">—</span>'}</td>
    </tr>`).join('');
    document.getElementById('pagination').innerHTML = `
        <button onclick="page=0;render()" ${page===0?'disabled':''}>««</button>
        <button onclick="page=Math.max(0,page-1);render()" ${page===0?'disabled':''}>«</button>
        <span>Page ${page+1} of ${totalPages} (${filtered.length} results)</span>
        <button onclick="page=Math.min(${totalPages-1},page+1);render()" ${page>=totalPages-1?'disabled':''}>»</button>
        <button onclick="page=${totalPages-1};render()" ${page>=totalPages-1?'disabled':''}>»»</button>`;
}
function sort(k) { sortDir = sortKey === k ? -sortDir : 1; sortKey = k; render(); }
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
</script>
</body>
</html>
